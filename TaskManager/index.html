<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskManager</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="header__title">TaskManager</h1>
    </header>

    <main class="main">
      <section class="task-stats" aria-labelledby="task-stats-heading">
        <h2 id="task-stats-heading" class="visually-hidden">Thống kê công việc</h2>

        <div class="task-stats__item">
          <span class="task-stats__value" id="stats-total">0</span>
          <span class="task-stats__label">Tổng công việc</span>
        </div>

        <div class="task-stats__item">
          <span class="task-stats__value" id="stats-active">0</span>
          <span class="task-stats__label">Chưa làm</span>
        </div>

        <div class="task-stats__item">
          <span class="task-stats__value" id="stats-completed">0</span>
          <span class="task-stats__label">Hoàn thành</span>
        </div>
      </section>

      <section class="search-task" aria-labelledby="search-task-heading">
        <h2 id="search-task-heading" class="visually-hidden">Tìm kiếm công việc</h2>

        <label for="search-input" class="visually-hidden">Tìm kiếm theo tiêu đề</label>
        <input
          type="text"
          id="search-input"
          class="add-task__input"
          placeholder="Tìm theo tiêu đề..."
          autocomplete="off"
        >
        <button type="button" id="add-task-btn" class="add-task__btn"><i class="fa-solid fa-plus" aria-hidden="true"></i>Thêm</button>
      </section>


   <section class="task-list-section" aria-labelledby="task-list-heading">
     <h2 id="task-list-heading">Danh sách công việc</h2>

     <ul id="task-list" class="task-list"></ul>

     <p id="empty-state" class="empty-state" hidden>
    Chưa có công việc nào. Hãy thêm công việc đầu tiên!
     </p>
   </section>

      <!-- Modals required by SPEC (hidden by default) -->
      <div id="add-task-modal" class="modal" hidden aria-hidden="true">
        <div class="modal__content" role="dialog" aria-modal="true" aria-labelledby="add-task-modal-title">
          <h3 id="add-task-modal-title">Thêm công việc</h3>
          <label for="add-task-input" class="visually-hidden">Tiêu đề công việc</label>
          <input type="text" id="add-task-input" class="add-task__input" maxlength="100" autocomplete="off">
          <p id="form-error" class="add-task__error" role="alert" hidden></p>
          <div class="modal__actions">
            <button type="button" id="add-task-save" class="add-task__btn">Lưu</button>
            <button type="button" id="add-task-cancel" class="add-task__btn">Hủy</button>
          </div>
        </div>
      </div>

      <div id="edit-task-modal" class="modal" hidden aria-hidden="true">
        <div class="modal__content" role="dialog" aria-modal="true" aria-labelledby="edit-task-modal-title">
          <h3 id="edit-task-modal-title">Sửa công việc</h3>
          <label for="edit-task-input" class="visually-hidden">Tiêu đề công việc</label>
          <input type="text" id="edit-task-input" class="add-task__input" maxlength="100" autocomplete="off">
          <p id="edit-form-error" class="add-task__error" role="alert" hidden></p>
          <div class="modal__actions">
            <button type="button" id="edit-task-save" class="add-task__btn">Lưu</button>
            <button type="button" id="edit-task-cancel" class="add-task__btn">Hủy</button>
          </div>
        </div>
      </div>

      <div id="delete-task-modal" class="modal" hidden aria-hidden="true">
        <div class="modal__content" role="dialog" aria-modal="true" aria-labelledby="delete-task-modal-title">
          <h3 id="delete-task-modal-title">Xóa công việc</h3>
          <p id="delete-task-message">Bạn có chắc muốn xóa công việc này?</p>
          <div class="modal__actions">
            <button type="button" id="delete-task-confirm" class="add-task__btn">Xóa</button>
            <button type="button" id="delete-task-cancel" class="add-task__btn">Hủy</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
